{% extends "base.html" %}
{% block content %}
<h1>Event Log</h1>
{% if images %}
    {% for img in images %}
    <div class="card">
        <div style="font-size: 0.7rem; color: #888; margin-bottom: 8px;">TIME: {{ img }}</div>
        <img src="/static/alerts/{{ img }}" style="width: 100%; border-radius: 10px;">
    </div>
    {% endfor %}
{% else %}
    <div class="card" style="text-align: center; color: #666;">No alerts recorded yet.</div>
{% endif %}
{% endblock %}
